[build]
  command = "npm run build"
  publish = "dist"

# Garante que o React Router funcione em qualquer rota direta
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# index.html: nunca cachear — garante que usuários sempre recebam a versão mais nova
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# manifest.json: mesma regra — deve sempre refletir a versão atual
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Assets com hash (JS/CSS): imutáveis, cache máximo — o hash garante invalidação automática
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
